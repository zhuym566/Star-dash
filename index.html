<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Star Dash</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f0df;
      --muted: #a8b5b0;
      --panel: rgba(13, 18, 24, 0.76);
      --line: rgba(255, 255, 255, 0.16);
      --green: #60d394;
      --gold: #ffd166;
      --red: #ef476f;
      --cyan: #5dd9c1;
      --deep: #071014;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(99, 212, 164, 0.24), transparent 28%),
        radial-gradient(circle at 82% 74%, rgba(239, 71, 111, 0.18), transparent 32%),
        linear-gradient(145deg, #070a10 0%, #10211d 48%, #261224 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      min-height: 420px;
      padding:
        var(--safe-top)
        var(--safe-right)
        var(--safe-bottom)
        var(--safe-left);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + clamp(8px, 2.6vw, 18px));
      left: 50%;
      z-index: 5;
      display: grid;
      width: min(920px, calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - 24px));
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .meter {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: clamp(8px, 2vw, 10px) clamp(8px, 2.4vw, 12px);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
    }

    .label {
      color: var(--muted);
      font-size: clamp(10px, 2.7vw, 11px);
      line-height: 1.1;
    }

    .value {
      margin-top: 4px;
      overflow: hidden;
      font-size: clamp(17px, 5vw, 28px);
      font-weight: 760;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .center {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      place-items: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 24px)
        calc(env(safe-area-inset-right, 0px) + 18px)
        calc(env(safe-area-inset-bottom, 0px) + 24px)
        calc(env(safe-area-inset-left, 0px) + 18px);
      pointer-events: none;
    }

    .dialog {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 16, 20, 0.86);
      padding: 22px;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.42);
      text-align: center;
      backdrop-filter: blur(22px);
      pointer-events: auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 13vw, 72px);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .copy {
      margin: 14px auto 18px;
      max-width: 34ch;
      color: #d2ddd6;
      font-size: 15px;
      line-height: 1.45;
    }

    button {
      display: inline-grid;
      min-width: 152px;
      min-height: 48px;
      place-items: center;
      border: 0;
      border-radius: 8px;
      background: var(--gold);
      color: #17120a;
      cursor: pointer;
      font: inherit;
      font-weight: 780;
      letter-spacing: 0;
    }

    button:focus-visible {
      outline: 3px solid rgba(93, 217, 193, 0.8);
      outline-offset: 3px;
    }

    .hint {
      position: absolute;
      right: calc(env(safe-area-inset-right, 0px) + clamp(12px, 3vw, 24px));
      bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(12px, 3vw, 24px));
      z-index: 5;
      max-width: min(320px, calc(100% - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 16, 20, 0.6);
      padding: 10px 12px;
      color: #dbe4df;
      font-size: 13px;
      line-height: 1.35;
      backdrop-filter: blur(16px);
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .app {
        min-height: 100%;
      }

      .hud {
        width: calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px) - 16px);
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .meter {
        min-height: 54px;
        padding: 8px 6px;
        text-align: center;
      }

      .hint {
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        text-align: center;
      }
    }

    @media (max-width: 380px) {
      .hud {
        gap: 5px;
      }

      .meter {
        padding-inline: 4px;
      }

      .hint {
        font-size: 12px;
      }
    }

    @media (max-height: 680px) and (orientation: portrait) {
      .hint {
        display: none;
      }

      .dialog {
        padding: 18px;
      }

      .copy {
        margin-block: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Star Dash game">
    <canvas id="game" aria-label="Game canvas"></canvas>
    <section class="hud" aria-live="polite">
      <div class="meter">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="meter">
        <div class="label">连击</div>
        <div class="value" id="combo">x1</div>
      </div>
      <div class="meter">
        <div class="label">时间</div>
        <div class="value" id="time">45</div>
      </div>
      <div class="meter">
        <div class="label">护盾</div>
        <div class="value" id="shield">3</div>
      </div>
    </section>

    <section class="center" id="overlay">
      <div class="dialog">
        <h1>Star Dash</h1>
        <p class="copy" id="message">收集金色星尘，避开红色彗星。手机拖动、方向键或 WASD 都可以移动。</p>
        <button id="start">开始</button>
      </div>
    </section>

    <div class="hint">拖动屏幕移动。金色星尘加分，绿色星环补护盾，红色彗星会打断连击。</div>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const comboEl = document.querySelector("#combo");
    const timeEl = document.querySelector("#time");
    const shieldEl = document.querySelector("#shield");
    const overlay = document.querySelector("#overlay");
    const message = document.querySelector("#message");
    const startButton = document.querySelector("#start");

    const state = {
      running: false,
      width: 0,
      height: 0,
      dpr: 1,
      score: 0,
      combo: 1,
      shield: 3,
      timeLeft: 45,
      lastTime: 0,
      spawnTimer: 0,
      hazardTimer: 0,
      ringTimer: 0,
      shake: 0,
      playTop: 96,
      playBottom: 0,
      edge: 20,
      speed: 760,
      touchOffset: 0,
      keys: new Set(),
      pointer: null,
      stars: [],
      hazards: [],
      rings: [],
      particles: [],
      ship: { x: 0, y: 0, vx: 0, vy: 0, radius: 15 }
    };

    const rand = (min, max) => Math.random() * (max - min) + min;
    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const distance = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
    const isCoarsePointer = () => window.matchMedia("(pointer: coarse)").matches;

    function viewportSize() {
      const visual = window.visualViewport;
      return {
        width: Math.round(visual?.width || window.innerWidth),
        height: Math.round(visual?.height || window.innerHeight)
      };
    }

    function tuneForViewport() {
      const narrow = state.width <= 480;
      const short = state.height <= 700;
      const base = Math.min(state.width, state.height);
      state.edge = clamp(base * 0.055, 18, 28);
      state.playTop = clamp(state.height * (narrow ? 0.16 : 0.13), short ? 86 : 104, narrow ? 142 : 156);
      state.playBottom = state.height - clamp(state.height * (narrow ? 0.1 : 0.08), 54, narrow ? 92 : 82);
      state.speed = clamp(base * (narrow ? 2.05 : 1.65), 560, 860);
      state.touchOffset = isCoarsePointer() ? clamp(state.height * 0.085, 54, 82) : 0;
      state.ship.radius = clamp(base * 0.04, 13, 18);
      state.ship.x = clamp(state.ship.x || state.width * 0.5, state.edge, state.width - state.edge);
      state.ship.y = clamp(state.ship.y || state.height * 0.68, state.playTop, state.playBottom);
    }

    function resize() {
      const size = viewportSize();
      state.dpr = Math.min(window.devicePixelRatio || 1, 2);
      state.width = size.width;
      state.height = size.height;
      canvas.width = Math.floor(state.width * state.dpr);
      canvas.height = Math.floor(state.height * state.dpr);
      canvas.style.width = `${state.width}px`;
      canvas.style.height = `${state.height}px`;
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      tuneForViewport();
    }

    function resetGame() {
      state.running = true;
      state.score = 0;
      state.combo = 1;
      state.shield = 3;
      state.timeLeft = 45;
      state.spawnTimer = 0;
      state.hazardTimer = 0;
      state.ringTimer = 4;
      state.shake = 0;
      state.stars = [];
      state.hazards = [];
      state.rings = [];
      state.particles = [];
      state.ship = {
        x: state.width * 0.5,
        y: clamp(state.height * 0.72, state.playTop, state.playBottom),
        vx: 0,
        vy: 0,
        radius: clamp(Math.min(state.width, state.height) * 0.04, 13, 18)
      };
      tuneForViewport();
      overlay.classList.add("hidden");
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = state.score;
      comboEl.textContent = `x${state.combo}`;
      timeEl.textContent = Math.max(0, Math.ceil(state.timeLeft));
      shieldEl.textContent = state.shield;
    }

    function spawnStar() {
      const size = clamp(state.width * rand(0.02, 0.031), 7, 12);
      state.stars.push({
        x: rand(state.edge + 8, state.width - state.edge - 8),
        y: state.playTop - 42,
        radius: size,
        vy: rand(state.height * 0.12, state.height * 0.2),
        spin: rand(0, Math.PI * 2)
      });
    }

    function spawnHazard() {
      const radius = clamp(state.width * rand(0.038, 0.06), 14, 24);
      const fromLeft = Math.random() > 0.5;
      state.hazards.push({
        x: fromLeft ? -36 : state.width + 36,
        y: rand(state.playTop + 12, state.playBottom - 16),
        radius,
        vx: (fromLeft ? 1 : -1) * rand(state.width * 0.34, state.width * 0.58),
        vy: rand(-state.height * 0.035, state.height * 0.055),
        spin: rand(0, Math.PI * 2)
      });
    }

    function spawnRing() {
      state.rings.push({
        x: rand(state.edge + 14, state.width - state.edge - 14),
        y: state.playTop - 38,
        radius: clamp(state.width * 0.046, 15, 19),
        vy: rand(state.height * 0.09, state.height * 0.13),
        pulse: 0
      });
    }

    function burst(x, y, color, count = 16) {
      for (let i = 0; i < count; i++) {
        const angle = rand(0, Math.PI * 2);
        const speed = rand(40, 210);
        state.particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: rand(0.28, 0.72),
          maxLife: 0.72,
          size: rand(2, 5),
          color
        });
      }
    }

    function moveShip(dt) {
      const target = { x: 0, y: 0 };
      if (state.keys.has("arrowleft") || state.keys.has("a")) target.x -= 1;
      if (state.keys.has("arrowright") || state.keys.has("d")) target.x += 1;
      if (state.keys.has("arrowup") || state.keys.has("w")) target.y -= 1;
      if (state.keys.has("arrowdown") || state.keys.has("s")) target.y += 1;

      if (state.pointer) {
        const dx = state.pointer.x - state.ship.x;
        const dy = (state.pointer.y - state.touchOffset) - state.ship.y;
        state.ship.vx += dx * 8 * dt;
        state.ship.vy += dy * 8 * dt;
      } else if (target.x || target.y) {
        const len = Math.hypot(target.x, target.y) || 1;
        state.ship.vx += (target.x / len) * state.speed * dt;
        state.ship.vy += (target.y / len) * state.speed * dt;
      }

      state.ship.vx *= Math.pow(0.015, dt);
      state.ship.vy *= Math.pow(0.015, dt);
      state.ship.x = clamp(state.ship.x + state.ship.vx * dt, state.edge, state.width - state.edge);
      state.ship.y = clamp(state.ship.y + state.ship.vy * dt, state.playTop, state.playBottom);
    }

    function update(dt) {
      if (!state.running) return;

      state.timeLeft -= dt;
      state.spawnTimer -= dt;
      state.hazardTimer -= dt;
      state.ringTimer -= dt;
      state.shake = Math.max(0, state.shake - dt * 18);

      if (state.spawnTimer <= 0) {
        spawnStar();
        state.spawnTimer = rand(0.22, 0.48);
      }

      if (state.hazardTimer <= 0) {
        spawnHazard();
        state.hazardTimer = rand(0.72, 1.18);
      }

      if (state.ringTimer <= 0) {
        spawnRing();
        state.ringTimer = rand(7.5, 11.5);
      }

      moveShip(dt);

      for (const star of state.stars) {
        star.y += star.vy * dt;
        star.spin += dt * 4;
      }

      for (const hazard of state.hazards) {
        hazard.x += hazard.vx * dt;
        hazard.y += hazard.vy * dt;
        hazard.spin += dt * 5;
      }

      for (const ring of state.rings) {
        ring.y += ring.vy * dt;
        ring.pulse += dt * 5;
      }

      for (const particle of state.particles) {
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 120 * dt;
        particle.life -= dt;
      }

      state.stars = state.stars.filter((star) => {
        if (distance(star, state.ship) < star.radius + state.ship.radius) {
          const gain = 10 * state.combo;
          state.score += gain;
          state.combo = Math.min(9, state.combo + 1);
          burst(star.x, star.y, "#ffd166", 18);
          return false;
        }
        return star.y < state.playBottom + 70;
      });

      state.hazards = state.hazards.filter((hazard) => {
        if (distance(hazard, state.ship) < hazard.radius + state.ship.radius - 3) {
          state.shield -= 1;
          state.combo = 1;
          state.shake = 8;
          burst(hazard.x, hazard.y, "#ef476f", 24);
          if (state.shield <= 0) finishGame();
          return false;
        }
        return hazard.x > -70 && hazard.x < state.width + 70 && hazard.y > state.playTop - 80 && hazard.y < state.playBottom + 80;
      });

      state.rings = state.rings.filter((ring) => {
        if (distance(ring, state.ship) < ring.radius + state.ship.radius) {
          state.shield = Math.min(5, state.shield + 1);
          state.score += 25;
          burst(ring.x, ring.y, "#60d394", 22);
          return false;
        }
        return ring.y < state.playBottom + 70;
      });

      state.particles = state.particles.filter((particle) => particle.life > 0);

      if (state.timeLeft <= 0) finishGame();
      updateHud();
    }

    function drawStar(x, y, radius, spin) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(spin);
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const r = i % 2 ? radius * 0.45 : radius;
        const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fillStyle = "#ffd166";
      ctx.shadowColor = "rgba(255, 209, 102, 0.8)";
      ctx.shadowBlur = 18;
      ctx.fill();
      ctx.restore();
    }

    function drawShip() {
      const ship = state.ship;
      const angle = Math.atan2(state.ship.vy, state.ship.vx);
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(Number.isFinite(angle) ? angle : 0);

      ctx.beginPath();
      ctx.moveTo(20, 0);
      ctx.lineTo(-14, -12);
      ctx.lineTo(-8, 0);
      ctx.lineTo(-14, 12);
      ctx.closePath();
      ctx.fillStyle = "#5dd9c1";
      ctx.shadowColor = "rgba(93, 217, 193, 0.8)";
      ctx.shadowBlur = 24;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(-3, 0, 5, 0, Math.PI * 2);
      ctx.fillStyle = "#f7f0df";
      ctx.shadowBlur = 0;
      ctx.fill();
      ctx.restore();
    }

    function drawHazard(hazard) {
      ctx.save();
      ctx.translate(hazard.x, hazard.y);
      ctx.rotate(hazard.spin);
      const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, hazard.radius * 1.4);
      glow.addColorStop(0, "#ff91a8");
      glow.addColorStop(0.58, "#ef476f");
      glow.addColorStop(1, "rgba(239, 71, 111, 0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, hazard.radius * 1.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ef476f";
      ctx.beginPath();
      for (let i = 0; i < 9; i++) {
        const a = (i / 9) * Math.PI * 2;
        const r = i % 2 ? hazard.radius * 0.62 : hazard.radius;
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawRing(ring) {
      ctx.save();
      ctx.translate(ring.x, ring.y);
      ctx.strokeStyle = "#60d394";
      ctx.lineWidth = 4;
      ctx.shadowColor = "rgba(96, 211, 148, 0.9)";
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(0, 0, ring.radius + Math.sin(ring.pulse) * 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawBackground(time) {
      ctx.fillStyle = "rgba(7, 10, 16, 0.32)";
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.save();
      ctx.globalAlpha = 0.74;
      for (let i = 0; i < 90; i++) {
        const x = (i * 97 + time * (12 + (i % 5) * 8)) % (state.width + 60) - 30;
        const y = (i * 53 + Math.sin(time * 0.001 + i) * 16) % state.height;
        const size = (i % 4) + 0.8;
        ctx.fillStyle = i % 9 === 0 ? "rgba(255, 209, 102, 0.8)" : "rgba(247, 240, 223, 0.52)";
        ctx.fillRect(x, y, size, size);
      }
      ctx.restore();
    }

    function draw(time) {
      ctx.save();
      if (state.shake > 0) {
        ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
      }

      drawBackground(time);
      for (const star of state.stars) drawStar(star.x, star.y, star.radius, star.spin);
      for (const ring of state.rings) drawRing(ring);
      for (const hazard of state.hazards) drawHazard(hazard);
      for (const particle of state.particles) {
        ctx.globalAlpha = clamp(particle.life / particle.maxLife, 0, 1);
        ctx.fillStyle = particle.color;
        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      drawShip();
      ctx.restore();
    }

    function finishGame() {
      if (!state.running) return;
      state.running = false;
      message.textContent = `本局 ${state.score} 分。再来一局，把手感调出来。`;
      startButton.textContent = "再玩一次";
      overlay.classList.remove("hidden");
      updateHud();
    }

    function loop(time) {
      const dt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
      state.lastTime = time;
      update(dt);
      draw(time);
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resize);
    window.visualViewport?.addEventListener("resize", resize);
    window.addEventListener("orientationchange", () => requestAnimationFrame(resize));
    window.addEventListener("contextmenu", (event) => event.preventDefault());
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["arrowleft", "arrowright", "arrowup", "arrowdown", "w", "a", "s", "d"].includes(key)) {
        event.preventDefault();
        state.keys.add(key);
      }
      if (key === " " && !state.running) resetGame();
    });
    window.addEventListener("keyup", (event) => state.keys.delete(event.key.toLowerCase()));

    canvas.addEventListener("pointerdown", (event) => {
      state.pointer = { x: event.clientX, y: event.clientY };
      canvas.setPointerCapture(event.pointerId);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (state.pointer) state.pointer = { x: event.clientX, y: event.clientY };
    });
    canvas.addEventListener("pointerup", () => {
      state.pointer = null;
    });
    canvas.addEventListener("pointercancel", () => {
      state.pointer = null;
    });

    startButton.addEventListener("click", resetGame);

    resize();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
